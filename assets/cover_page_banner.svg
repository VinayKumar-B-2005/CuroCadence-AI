<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <filter id="blurFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="pillGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#F97316" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#0B1120" />

  <g stroke="#22D3EE" stroke-width="2" fill="none" opacity="0.3">
    <path d="M 40,80 L 40,40 L 80,40" />
    <path d="M 1560,80 L 1560,40 L 1520,40" />
    <path d="M 40,820 L 40,860 L 80,860" />
    <path d="M 1560,820 L 1560,860 L 1520,860" />
    <rect x="40" y="40" width="1520" height="820" opacity="0.1" />
  </g>

  <circle cx="1300" cy="200" r="250" fill="#22D3EE" opacity="0.15" filter="url(#blurFilter)" />
  <circle cx="300" cy="700" r="300" fill="#A78BFA" opacity="0.12" filter="url(#blurFilter)" />
  <circle cx="900" cy="500" r="350" fill="#22D3EE" opacity="0.05" filter="url(#blurFilter)" />

  <g transform="translate(160, 420)">
    <text x="0" y="0" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="90" font-weight="800" letter-spacing="2">CUROCADENCE AI</text>
    <text x="5" y="60" fill="#A78BFA" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" letter-spacing="1">Safe. Smart. Always Watching Your Meds.</text>
    
    <g transform="translate(10, 160)">
      <g transform="translate(0, 0)">
        <g transform="translate(30, 15) rotate(45)">
          <path d="M -12,-12 A 12,12 0 0 1 12,-12 L 12,12 A 12,12 0 0 1 -12,12 Z" fill="url(#pillGradient)" />
          <path d="M -12,0 L 12,0 L 12,12 A 12 12 0 0 1 -12 12 Z" fill="#000000" opacity="0.15" />
          <line x1="-12" y1="0" x2="12" y2="0" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" />
        </g>
        <text x="30" y="70" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Track</text>
      </g>

      <g transform="translate(160, 0)">
        <g transform="translate(30, 15)">
          <path d="M 0,-20 L 16,-12 L 16,4 C 16,16 8,24 0,28 C -8,24 -16,16 -16,4 L -16,-12 Z" fill="none" stroke="#22D3EE" stroke-width="3" stroke-linejoin="round" />
          <path d="M 0,-15 L 11,-9 L 11,3 C 11,11 6,17 0,21 C -6,17 -11,11 -11,3 L -11,-9 Z" fill="#22D3EE" opacity="0.2" />
        </g>
        <text x="30" y="70" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Protect</text>
      </g>

      <g transform="translate(320, 0)">
        <g transform="translate(30, 20)">
          <rect x="-14" y="-8" width="6" height="12" fill="#A78BFA" />
          <rect x="-3" y="-18" width="6" height="22" fill="#A78BFA" />
          <rect x="8" y="-30" width="6" height="34" fill="#A78BFA" />
          <line x1="-18" y1="8" x2="18" y2="8" stroke="#A78BFA" stroke-width="3" stroke-linecap="round" />
        </g>
        <text x="30" y="70" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Report</text>
      </g>
    </g>
  </g>

  <g transform="translate(1150, 450)">
    <polyline points="-300,0 -200,0 -150,-80 -100,100 -50,-50 -10,30 20,-120 60,80 100,-20 140,0 350,0" 
              fill="none" stroke="#22D3EE" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"
              filter="url(#glow)" />
              
    <g transform="translate(0, -10) rotate(30)">
      <path d="M -35,-35 A 35,35 0 0 1 35,-35 L 35,35 A 35,35 0 0 1 -35,35 Z" fill="url(#pillGradient)" />
      <path d="M -35,0 L 35,0 L 35,35 A 35 35 0 0 1 -35 35 Z" fill="#000000" opacity="0.15" />
      <line x1="-35" y1="0" x2="35" y2="0" stroke="#FFFFFF" stroke-width="4" opacity="0.4" />
      <path d="M -20,-45 C -20,-55 -10,-60 0,-60 C 10,-60 20,-55 20,-45 L 20,45 C 20,55 10,60 0,60 C -10,60 -20,55 -20,45 Z" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3" />
      <path d="M -15,-45 L -15,45" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.4" />
    </g>
  </g>
</svg>
